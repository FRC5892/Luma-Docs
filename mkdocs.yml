
site_name: 5892-Docs
site_url: https://frc5892.github.io
site_description: >-
  Community documentation by FRC Team 5892 for robotics hardware and software guides.
site_author: FRC Team 5892
repo_name: FRC5892/5892-Docs
repo_url: https://github.com/FRC5892/5892-Docs
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - announce.dismiss

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FRC5892/5892-Docs
  announcement: >-
    These docs are an unofficial FRC 5892 community project and are
    <strong>not affiliated with any organizations or companies mentioned</strong>.

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/persistent-tasklist.js
  - javascripts/external-links.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Luma:
      - P1:
          - Overview: p1/overview.md
          - Prerequisites: p1/prerequisites.md
          - Flashing: p1/flashing.md
          - Networking: p1/networking.md
          - Calibration: p1/calibration.md
          - Troubleshooting: p1/troubleshooting.md
      - LumaSwitch:
          - Overview: guides/lumaswitch/overview.md
          - Mounting: guides/lumaswitch/mounting.md
          - Wiring: guides/lumaswitch/wiring.md
          - Troubleshooting: guides/lumaswitch/troubleshooting.md
  - LoggedTalonFX:
      - Placeholder: loggedtalonfx/placeholder.md
  - Contributing: contributing.md
